# GDrive backup — uploads to folder 1HK8Ug4FZWXxk08A_nWGJ-iyHTcFkl6Gt (root for all models)
# Use rclone.conf (see README): RCLONE_CONFIG or RCLONE_CONFIG_DIR points to your config.
# Remote must be named "gdrive"; path gdrive:<folder_id> sends data into that folder.
# When the archiver updates run_state or sync_archive it touches metadata_pending_path;
# run.sh runs backup-extra first when that file exists (queued metadata upload).

archiver_root: /home/x/dev/model-archival/local
metadata_pending_path: /mnt/models/d5/gdrive_metadata_pending

gdrive:
  # Target folder on Google Drive (ID from share link: drive.google.com/.../folders/<id>)
  remote: gdrive:1HK8Ug4FZWXxk08A_nWGJ-iyHTcFkl6Gt
  base_path: ""
  # Single worker: one file transfer at a time (set higher for parallel uploads)
  transfers: 1
  checkers: 1
  # Limit upload to 3 MB/s so downloads are not starved (rclone: upload:download, "off" = unlimited download)
  bwlimit: "3M:off"

# Each entry: path string (remote dir name = basename) or { path: ..., dest: "extra/name" }.
# d5-code-archives = code-archival output on D5 (manifest, release tarballs); avoid collision with dev code-archives.
extra_paths:
  - /home/x/dev/model-archival/local/config/registry.yaml
  - /home/x/dev/model-archival/local/config/drives.yaml
  - /mnt/models/d5/archive
  - /mnt/models/d5/logs
  - /mnt/models/d5/run_state.json
  - /home/x/dev/fingerprints
  - /home/x/dev/code-archives
  - path: /mnt/models/d5/code-archives
    dest: extra/d5-code-archives

# --- Critical backup: models we actually use in practice; GDrive more reliable than local disks ---
# Lean heavy on smaller (<200 GB) + GGUF; preserve what we can't lose.
# When upload_selection is set below, model_ids_* are ignored. Keep it commented to use this list.
# upload_selection:
#   run_state_path: /mnt/models/d5/run_state.json
#   drives: [d2, d3]
#   max_total_gb: 3000
#   max_per_model_gb: 200

# Base models only (pre-trained, no instruct). GGUF list empty — registry GGUF are instruct quants; add base GGUF here when available.
model_ids_gguf: []

model_ids_full:
  # Qwen2.5 bases (pre-trained)
  - Qwen/Qwen2.5-3B
  - Qwen/Qwen2.5-7B
  - Qwen/Qwen2.5-14B
  - Qwen/Qwen2.5-32B
  - Qwen/Qwen2.5-72B
  # Other bases when available
  - google/gemma-3-27b-pt
