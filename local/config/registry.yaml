# =============================================================================
# Tooling projects — non-model code that enables Cursor-like assistants
# Mirrored to D5 via scripts/archive-tooling.sh (bare git at D5/tooling-archive/<id>.git).
# Fields: id, category, repo, description, notes
# =============================================================================
tooling:
  - id: continue
    category: ide_assistant
    repo: "https://github.com/continuedev/continue"
    description: "Open-source AI code assistant for VS Code / JetBrains / Neovim."
  - id: aider
    category: ide_assistant
    repo: "https://github.com/paul-gauthier/aider"
    description: "Git-aware CLI coding assistant that edits repos via patches."
  - id: tabby
    category: ide_assistant
    repo: "https://github.com/TabbyML/tabby"
    description: "Self-hosted code completion server with editor plugins."
  - id: openhands
    category: agent_platform
    repo: "https://github.com/All-Hands-AI/OpenHands"
    description: "Full-stack software-engineer agent (successor to OpenDevin)."
  - id: opendevin
    category: agent_platform
    repo: "https://github.com/OpenDevin/OpenDevin"
    description: "Earlier open-source auto-dev platform."
  - id: langchain
    category: agent_framework
    repo: "https://github.com/langchain-ai/langchain"
    description: "LLM orchestration and agent framework with tools and retrieval."
  - id: langgraph
    category: agent_framework
    repo: "https://github.com/langchain-ai/langgraph"
    description: "Graph-based stateful agent runtime for multi-step workflows."
  - id: llamaindex
    category: agent_framework
    repo: "https://github.com/run-llama/llama_index"
    description: "RAG and agent framework for indexing docs and code."
  - id: semantic-kernel
    category: agent_framework
    repo: "https://github.com/microsoft/semantic-kernel"
    description: "Plugin- and planner-based framework for LLM skills."
  - id: autogen
    category: agent_framework
    repo: "https://github.com/microsoft/autogen"
    description: "Multi-agent orchestration for LLMs and tool-use."
  - id: vllm
    category: serving_backend
    repo: "https://github.com/vllm-project/vllm"
    description: "High-throughput OpenAI-compatible model serving."
  - id: llama.cpp
    category: serving_backend
    repo: "https://github.com/ggerganov/llama.cpp"
    description: "CPU/GPU inference for quantized LLMs."
  - id: ollama
    category: serving_backend
    repo: "https://github.com/ollama/ollama"
    description: "Local model runner with simple HTTP API."
  - id: sourcegraph-cody
    category: code_intel
    repo: "https://github.com/sourcegraph/sourcegraph"
    description: "Semantic code search and LSP-style code intelligence."
  - id: swe-bench
    category: eval_harness
    repo: "https://github.com/princeton-nlp/SWE-bench"
    description: "Benchmark for software-engineering agents on real issues."
  - id: human-eval
    category: eval_harness
    repo: "https://github.com/openai/human-eval"
    description: "Classic Python coding benchmark and evaluation harness."
