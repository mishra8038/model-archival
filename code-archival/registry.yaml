# =============================================================================
# code-archival registry
#
# Each entry archives the latest state of a project:
#   - Shallow git clone (latest commit on default branch, no history)
#   - Latest release tarball from GitHub
#   - metadata.json (licence, description, stars, last commit, archived date)
#
# Risk levels:
#   critical  Individual maintainer OR regulatory target OR no institutional backup
#   high      Small org / VC-backed with unclear longevity / Chinese org
#   medium    Institutional but could be gated or pivoted
#   low       Large stable org, widely mirrored — archive as dependency anchor
#
# Categories:
#   inference           Run model weights locally (CPU/GPU)
#   inference-ui        Chat UIs and front-ends
#   server              OpenAI-compatible API servers
#   training            Fine-tune / train models
#   quantization        Compress weights (GGUF, AWQ, EXL2, GPTQ, BnB)
#   model-editing       Merge, splice, prune, and reshape model weights
#   evaluation          Benchmark and evaluate models
#   alignment           Safety, abliteration, red-teaming research
#   interpretability    Mechanistic interpretability and probing tools
#   observability       LLM tracing, monitoring, and debugging in production
#   agents              Agent frameworks and tool-use orchestration
#   web-agents          Browser/web automation AI agents
#   coding-agents       Autonomous coding assistants and AI pair-programmers
#   rag                 Retrieval-augmented generation pipelines
#   tooling             Converters, tokenizers, model management utilities
#   model-conversion    Cross-format export (ONNX, OpenVINO, TFLite, Triton)
#   structured-llm      Structured output / schema validation for LLM responses
#   synthetic-data      Synthetic dataset generation pipelines for training
#   multimodal-training Vision-language model training codebases
#   voice-pipeline      End-to-end spoken AI (STT + VAD + TTS + voice cloning)
#   prompt-engineering  Prompt libraries, frameworks, and reference collections
#   dataset             Training datasets and data pipelines
#   reasoning           Open reasoning model training and reproduction
#   memory              Long-context and persistent memory systems
#
# Last updated: 2026-03-05 — cross-referenced against live GitHub trending,
#   OSS Insight AI rankings, and HuggingFace leaderboard data.
#   Key additions: browser-use, Skyvern, open-r1, DSPy, Instructor, Khoj,
#   LangGraph, opencode-ai/opencode, DeepSeek-R1, openai/gpt-oss
# =============================================================================

repos:

