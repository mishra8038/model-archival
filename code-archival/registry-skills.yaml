# =============================================================================
# Agent / LLM Skills archival registry
#
# Snapshots the main Agent Skills ecosystem:
#   - agentskills.io spec (agentskills/agentskills)
#   - Anthropic official skills (anthropics/skills)
#   - Awesome LLM Skills curated list (Prat011/awesome-llm-skills)
#   - All external GitHub repos referenced by awesome-llm-skills
#
# Download: use code-archival/archive.sh with this registry (see README-skills.md).
# Site snapshot: wget mirror agentskills.io (see README-skills.md).
#
# Schema matches code-archival/registry.yaml: id, github, category, risk, licence, notes.
# category: agent-skills (filter with --category agent-skills if merged into main registry).
# =============================================================================

repos:

  # --- Spec & official ---
  - id: agentskills/agentskills
    github: agentskills/agentskills
    category: agent-skills
    risk: low
    licence: NOASSERTION
    notes: >
      Open Agent Skills format spec, validation (skills-ref), reference library.
      agentskills.io docs reference this repo.

  - id: anthropics/skills
    github: anthropics/skills
    category: agent-skills
    risk: low
    licence: Apache-2.0
    notes: >
      Official Anthropic Agent Skills: document-skills (docx, pdf, pptx, xlsx),
      example skills (artifacts-builder, etc.), spec and templates.

  - id: Prat011/awesome-llm-skills
    github: Prat011/awesome-llm-skills
    category: agent-skills
    risk: medium
    licence: Apache-2.0
    notes: >
      Curated list of LLM Skills for Claude Code, Codex, Gemini CLI, OpenCode, Qwen Code.
      Contains in-repo skills (notion-*, changelog-generator, webapp-testing, etc.)
      and links to external repos below.

  # --- Referenced external repos (unique roots from awesome-llm-skills README) ---
